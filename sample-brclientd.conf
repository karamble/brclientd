[Application Options]

; ------------------------------------------------------------------------------
; Data settings
; ------------------------------------------------------------------------------

; Top-level application data directory. Defaults to ~/.brclientd on Linux,
; $LOCALAPPDATA/Brclientd on Windows, ~/Library/Application Support/Brclientd
; on macOS.
; appdata=~/.brclientd

; Directory for Bison Relay client state (DB, messages, downloads, embeds).
; Defaults to <appdata>/data/<network>.
; datadir=~/.brclientd/data/mainnet

; Directory for log output. Defaults to <appdata>/logs/<network>.
; logdir=~/.brclientd/logs/mainnet

; Logging level. One of: trace, debug, info, warn, error, critical.
; debuglevel=info

; ------------------------------------------------------------------------------
; Network settings
; ------------------------------------------------------------------------------

; Use the test network.
; testnet=1

; Use the simulation network.
; simnet=1

; Bison Relay relay server address.
; brserver=bisonrelay.org:443


[dcrlnd options]

; ------------------------------------------------------------------------------
; dcrlnd connection
; ------------------------------------------------------------------------------

; dcrlnd gRPC host and port.
; dcrlnd.rpchost=127.0.0.1:10009

; Path to dcrlnd's TLS certificate (~/.dcrlnd/tls.cert by default).
; dcrlnd.tlscertpath=~/.dcrlnd/tls.cert

; Path to dcrlnd's admin macaroon.
; dcrlnd.macaroonpath=~/.dcrlnd/data/chain/decred/mainnet/admin.macaroon


[clientrpc options]

; ------------------------------------------------------------------------------
; clientrpc (Phase 3+)
; ------------------------------------------------------------------------------

; Add one interface:port the clientrpc server listens on. Repeat to bind
; multiple interfaces. Defaults to 0.0.0.0:7676 if unset.
; clientrpc.listen=0.0.0.0:7676

; Auto-generate the rpc-client cert pair on first run.
; clientrpc.issueclientcert=1


[status options]

; ------------------------------------------------------------------------------
; /status HTTP endpoint
; ------------------------------------------------------------------------------

; Address the /status HTTP endpoint binds to. Returns the current Bison Relay
; connection state + CheckLNWalletUsable error (if any) as JSON.
; status.listen=0.0.0.0:7677
